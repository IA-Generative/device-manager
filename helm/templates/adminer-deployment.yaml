{{- if .Values.adminer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "device-service.fullname" . }}-adminer
  labels:
    {{- include "device-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: adminer
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "device-service.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: adminer
  template:
    metadata:
      labels:
        {{- include "device-service.labels" . | nindent 8 }}
        app.kubernetes.io/component: adminer
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: adminer
          image: "{{ .Values.adminer.image.repository }}:{{ .Values.adminer.image.tag }}"
          imagePullPolicy: {{ .Values.adminer.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            {{- if .Values.adminer.defaultServer }}
            - name: ADMINER_DEFAULT_SERVER
              value: {{ .Values.adminer.defaultServer | quote }}
            {{- else if not .Values.database.external.enabled }}
            - name: ADMINER_DEFAULT_SERVER
              value: {{ printf "%s-rw" (include "device-service.cnpgClusterName" .) | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- if .Values.adminer.resources }}
          resources:
            {{- toYaml .Values.adminer.resources | nindent 12 }}
          {{- end }}
{{- end }}
