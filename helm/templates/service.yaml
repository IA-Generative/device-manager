apiVersion: v1
kind: Service
metadata:
  name: {{ include "aigis.fullname" . }}
  labels:
    {{- include "aigis.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/component: app
    {{- include "aigis.selectorLabels" . | nindent 4 }}
