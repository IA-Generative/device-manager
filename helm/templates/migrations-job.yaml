{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "device-service.fullname" . }}-migrations
  labels:
    {{- include "device-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    {{- toYaml .Values.migrations.annotations | nindent 4 }}
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "device-service.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
        - name: migrate
          image: "{{ .Values.migrations.image.repository }}:{{ .Values.migrations.image.tag }}"
          imagePullPolicy: {{ .Values.migrations.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          command:
            - sh
            - -c
            - |
              set -e
              echo "Running migrations..."
              for f in /migrations/*.sql; do
                echo "Applying $f ..."
                psql "$DATABASE_URL" -f "$f"
              done
              echo "Migrations completed."
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "device-service.dbSecretName" . }}
                  key: {{ include "device-service.dbSecretKey" . }}
          volumeMounts:
            - name: migrations
              mountPath: /migrations
              readOnly: true
            - name: tmp
              mountPath: /tmp
          {{- if .Values.migrations.resources }}
          resources:
            {{- toYaml .Values.migrations.resources | nindent 12 }}
          {{- end }}
      volumes:
        - name: migrations
          configMap:
            name: {{ include "device-service.fullname" . }}-migrations
        - name: tmp
          emptyDir: {}
{{- end }}
