{{- if .Values.adminer.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aigis.fullname" . }}-adminer
  labels:
    {{- include "aigis.labels" . | nindent 4 }}
    app.kubernetes.io/component: adminer
spec:
  type: {{ .Values.adminer.service.type }}
  ports:
    - port: {{ .Values.adminer.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "aigis.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: adminer
{{- end }}
