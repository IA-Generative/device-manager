# ── Replicas ────────────────────────────────────────────────────────────────
replicaCount: 1

# ── Image ────────────────────────────────────────────────────────────────────
image:
  repository: ghcr.io/ia-generative/device-service
  pullPolicy: IfNotPresent
  # Defaults to the chart appVersion
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# ── Service Account ──────────────────────────────────────────────────────────
serviceAccount:
  create: true
  annotations: {}
  name: ""

# ── Pod annotations / labels ─────────────────────────────────────────────────
podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# ── Service ──────────────────────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 8080

# ── Ingress ──────────────────────────────────────────────────────────────────
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: device-service.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# ── Resources ────────────────────────────────────────────────────────────────
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# ── Autoscaling ──────────────────────────────────────────────────────────────
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# ── Node scheduling ──────────────────────────────────────────────────────────
nodeSelector: {}
tolerations: []
affinity: {}

# ── Application configuration ────────────────────────────────────────────────
app:
  # Runtime environment: development | production
  env: production
  # HTTP port the service listens on
  port: "8080"

  # ── Keycloak / OIDC ──
  keycloak:
    realm: "myapp"
    clientId: "device-cli"
    redirectUri: "http://localhost:8082/"
    publicUri: "http://localhost:8081/"
    jwksEndpoint: "http://keycloak:8080/realms/myapp/protocol/openid-connect/certs"

  # ── Attestation ──
  attestation:
    # software_only | prefer_hardware | require_hardware
    mode: "prefer_hardware"
    # Hours between mandatory re-attestations
    reattestIntervalHours: 24
    # Require X-Device-Signature header on protected endpoints
    requireDeviceSignature: false

  # ── Risk thresholds ──
  risk:
    # Trust score >= thresholdFull → full access
    thresholdFull: 70
    # Trust score >= thresholdLimited → limited access (MFA suggested)
    thresholdLimited: 40

  # ── CORS ──
  cors:
    allowedOrigins: "*"
    allowedMethods: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
    allowedHeaders: "Accept,Authorization,Content-Type,Origin,X-Device-ID,X-Device-Nonce,X-Device-Timestamp,X-Device-Signature"
    exposedHeaders: ""
    allowCredentials: true
    maxAgeSeconds: 300

  # ── SMTP / device approval emails ──
  smtp:
    host: "localhost"
    # Port: 1025 (Mailhog), 25 (relay), 587 (STARTTLS), 465 (SMTPS/TLS)
    port: "1025"
    from: "device-service@localhost"
    # Transport security: none | starttls | tls
    encryption: "none"
    # Authentication mechanism: none | plain | login | crammd5
    authType: "none"
    username: ""
    # SMTP password — leave empty when authType is "none" or use existingSecret
    password: ""
    # Reference an existing secret instead of creating one from 'password':
    # existingSecret:
    #   name: "my-smtp-secret"
    #   passwordKey: "password"

  # ── Enrollment Policy ──
  enrollment:
    # true → premier device auto-actif (Architecture A)
    autoApproveFirstDevice: true
    # Méthodes d'approbation (CSV) : acr, email, cross_device
    approvalMethods: "email,cross_device"
    # Trust score min pour qu'un device approuve un autre (Architecture C)
    crossDeviceMinTrust: 50
    # Durée de validité du code email en minutes (Architecture B)
    emailChallengeTTL: 30
    # acr_values Keycloak pour l'approbation MFA (vide = désactivé)
    acrValues: ""

  # ── Trust scoring par méthode d'approbation (points sur 30) ──
  trustPoints:
    firstDevice: 30
    email: 20
    acr: 25
    crossDevice: 30

# ── Frontend image / deployment ─────────────────────────────────────────────
frontend:
  # Enable deploying the frontend static site via this chart
  enabled: true
  # Optional runtime variables to inject into the backend so the SPA can
  # pick them up via /env.js. If left empty, the backend will fall back to
  # its defaults.
  apiUrl: ""
  exampleApiUrl: ""

# ── Redis / Valkey ──────────────────────────────────────────────────────────
redis:
  # Set external.enabled: true to skip the Valkey sub-chart and use your own
  # Redis/Valkey instance via the url below.
  external:
    enabled: false
    url: "redis://my-redis:6379"
    # Alternatively reference an existing secret:
    # existingSecret:
    #   name: "my-redis-secret"
    #   key: "url"

# ── Valkey sub-chart (https://github.com/bitnami/charts/tree/main/bitnami/valkey)
# Only deployed when redis.external.enabled is false.
# Full list of available parameters:
# https://github.com/bitnami/charts/blob/main/bitnami/valkey/values.yaml
valkey:
  # Must stay true so the sub-chart is included; disable redis entirely by
  # setting redis.external.enabled: true instead.
  enabled: true

  architecture: standalone

  auth:
    enabled: false
    # Set a password and reference it in redis.url when auth.enabled is true:
    # password: "changeme"

  primary:
    persistence:
      enabled: true
      size: 1Gi
      storageClass: ""
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 128Mi
    extraFlags:
      - "--appendonly yes"

# ── Database ─────────────────────────────────────────────────────────────────
database:
  # ── External database mode ──────────────────────────────────────────────
  # Set external.enabled: true to skip CNPG cluster creation entirely and
  # use the provided connection URL instead.
  external:
    enabled: false
    # Full PostgreSQL connection URL including credentials
    url: "postgres://device:device@external-postgres:5432/devicedb?sslmode=require"
    # Alternatively, reference an existing secret:
    # existingSecret:
    #   name: "my-db-secret"
    #   key: "url"

  # ── CloudNativePG cluster ────────────────────────────────────────────────
  # Used when external.enabled is false. Requires the CNPG operator to be
  # installed in the cluster (https://cloudnative-pg.io).
  cnpg:
    # Number of PostgreSQL instances in the cluster (>=1; 3 for HA)
    instances: 1

    # Database & owner created during bootstrap
    database: devicedb
    username: device

    # Password for the 'username' owner.
    # If empty, a random password is generated and stored in the cluster app secret.
    # Set to a non-empty value or use existingSecret to supply your own.
    password: ""
    # existingSecret:
    #   name: "my-pg-secret"
    #   key: "password"

    storage:
      size: 5Gi
      storageClass: ""

    # Extra PostgreSQL parameters (postgresql.conf)
    postgresql:
      parameters: {}

    # Resource requests/limits for each PostgreSQL instance
    resources: {}

    # Backup via barman (optional)
    backup:
      enabled: false
      # barmanObjectStore:
      #   destinationPath: "s3://my-bucket/backups"
      #   s3Credentials:
      #     accessKeyId:
      #       name: s3-creds
      #       key: ACCESS_KEY_ID
      #     secretAccessKey:
      #       name: s3-creds
      #       key: SECRET_ACCESS_KEY

    # WalStorage (optional, dedicated PVC for WAL)
    walStorage:
      enabled: false
      size: 1Gi
      storageClass: ""

# ── Database migrations ──────────────────────────────────────────────────────
migrations:
  # Run SQL migrations as a pre-install/pre-upgrade Job
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  # Additional annotations on the Job (e.g. argocd.argoproj.io/hook: PreSync)
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
  resources: {}

# ── Adminer ──────────────────────────────────────────────────────────────────
adminer:
  enabled: true

  image:
    repository: adminer
    tag: "4"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8080

  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: adminer.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

  resources: {}

  # Pre-fill the Adminer default server field
  defaultServer: ""
